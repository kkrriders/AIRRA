
x-backend-env: &backend-env
  AIRRA_DATABASE_URL: postgresql+asyncpg://airra:${POSTGRES_PASSWORD:-airra}@postgres:5432/airra
  AIRRA_REDIS_URL: redis://redis:6379/0
  AIRRA_PROMETHEUS_URL: http://prometheus:9090
  AIRRA_ENVIRONMENT: development
  AIRRA_DEBUG: "true"
  AIRRA_LOG_LEVEL: INFO
  AIRRA_API_KEY: ${AIRRA_API_KEY}
  AIRRA_LLM_PROVIDER: groq
  AIRRA_LLM_MODEL: llama-3.3-70b-versatile        # reasoning tasks (analysis, hypotheses)
  AIRRA_LLM_GENERATOR_MODEL: llama-3.1-8b-instant # creative tasks (AI incident gen) — Groq free tier
 
  AIRRA_OPENAI_API_KEY: ${AIRRA_OPENAI_API_KEY}
  AIRRA_SLACK_WEBHOOK_URL: ${AIRRA_SLACK_WEBHOOK_URL:-}

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: airra-postgres
    environment:
      POSTGRES_USER: airra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airra}
      POSTGRES_DB: airra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching, Celery broker/backend, and redbeat schedule state
  redis:
    image: redis:7-alpine
    container_name: airra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: airra-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

 
  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airra-db-migrate
    command: alembic upgrade head
    environment:
      AIRRA_DATABASE_URL: postgresql+asyncpg://airra:${POSTGRES_PASSWORD:-airra}@postgres:5432/airra
      AIRRA_REDIS_URL: redis://redis:6379/0
      AIRRA_API_KEY: ${AIRRA_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airra-backend
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airra-celery-worker
    # Handles high-frequency tasks: anomaly checks, embeddings, escalation checks.
    # Kept separate from the analysis queue so fast monitoring tasks are never
    # starved behind slow 3-8s LLM calls (and vice versa).
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 -Q celery
    environment:
      <<: *backend-env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "ping", "--timeout=10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  celery-analysis:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airra-celery-analysis
    # Dedicated pool for LLM analysis tasks (3-8s each).
    # concurrency=2 caps parallel LLM calls to avoid saturating the free-tier
    # API rate limit while still allowing pipelined analysis on burst incidents.
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2 -Q analysis
    environment:
      <<: *backend-env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "ping", "--timeout=10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airra-celery-beat
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      <<: *backend-env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
   
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # AIRRA Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: airra-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_API_KEY: ${AIRRA_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # Grafana — pre-provisioned with Prometheus datasource and AIRRA dashboard
  grafana:
    image: grafana/grafana:10.4.0
    container_name: airra-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env (e.g. openssl rand -hex 16)}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
