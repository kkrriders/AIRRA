apiVersion: apps/v1
kind: Deployment
metadata:
  name: airra-backend
  namespace: airra
  labels:
    app: airra-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: airra-backend
  template:
    metadata:
      labels:
        app: airra-backend
      annotations:
        # Prometheus will scrape /metrics on port 8000 automatically
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/airra-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: airra-config
            - secretRef:
                name: airra-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
