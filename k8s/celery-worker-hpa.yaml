apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: airra-celery-worker-hpa
  namespace: airra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: airra-celery-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
