# Secret template — fill in base64-encoded values before applying.
# Generate: echo -n 'your-value' | base64
#
# In production, manage secrets via:
#   - Sealed Secrets (kubeseal)
#   - External Secrets Operator (AWS Secrets Manager / GCP Secret Manager)
#   - HashiCorp Vault Agent Injector
#
# NEVER commit real secret values to git.
apiVersion: v1
kind: Secret
metadata:
  name: airra-secrets
  namespace: airra
type: Opaque
data:
  # echo -n 'your-api-key' | base64
  AIRRA_API_KEY: Y2hhbmdlLW1l

  # echo -n 'your-groq-api-key' | base64
  AIRRA_OPENAI_API_KEY: Y2hhbmdlLW1l
