apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: airra-backend-hpa
  namespace: airra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: airra-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
