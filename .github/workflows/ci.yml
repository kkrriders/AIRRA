name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Type check with mypy
        # Run in non-strict mode for now; tighten incrementally
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --no-header \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60
        env:
          AIRRA_API_KEY: ci-test-key-12345
          AIRRA_ENVIRONMENT: development
          AIRRA_DATABASE_URL: sqlite+aiosqlite:///:memory:
          AIRRA_REDIS_URL: redis://localhost:6379/0
          AIRRA_LLM_PROVIDER: groq
          AIRRA_GROQ_API_KEY: ci-placeholder-key

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
